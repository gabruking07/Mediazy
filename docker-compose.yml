services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    environment:
      MONGO_URI: mongodb://mongo:27017/mediazy
      REDIS_URL: redis://redis:6379
      CLIENT_URL: http://localhost:3000
      PUBLIC_BASE_URL: http://localhost:5000
      DOWNLOAD_QUEUE_ENABLED: "true"
    ports:
      - "5000:5000"
    volumes:
      - ./server/downloads:/app/downloads

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
    ports:
      - "3000:3000"

volumes:
  mongo-data:
  redis-data:
