services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./server/.env.example
    environment:
      MONGO_URI: mongodb://mongo:27017/mediazy
      CLIENT_URL: http://localhost:5173
      PUBLIC_BASE_URL: http://localhost:5000
    ports:
      - "5000:5000"
    volumes:
      - ./server/downloads:/app/downloads

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "5173:80"

volumes:
  mongo-data:
